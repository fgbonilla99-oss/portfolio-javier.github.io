<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Operaciones - Empresa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <span class="logo">Sys<span> | Hunter Douglas</span></span>
            <span class="badge-role" style="background: rgba(37,99,235,0.15); color: #60a5fa;">Interno</span>
        </div>
    </div>

    <div class="container container-wide">
        <div class="card" id="company-login" style="max-width: 500px; margin: 40px auto;">
            <div class="card-header">
                <h2>Access Control</h2>
                <p>Restricted panel for operators.</p>
            </div>
            <div class="form-group">
                <label for="user-empresa">User</label>
                <input type="text" id="user-empresa" placeholder="Ej. f.martinez" autocomplete="off">
            </div>
            <button class="btn btn-block" onclick="loginEmpresa()">Log In</button>
        </div>

        <div id="monitor-section" style="display: none;">
            <div class="dashboard-header">
                <div>
                    <h2>Active Appointments Monitor</h2>
                    <p style="font-size:0.9rem; color:var(--text-muted);">View of incoming orders for pickup.</p>
                </div>
                <div class="status-indicator">
                    <span class="dot-live"></span>
                    <span id="refresh-indicator">Syncing...</span>
                </div>
            </div>

            <div class="table-container desktop-only">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Appointment Time</th>
                            <th>Customer ID</th>
                            <th>Included Orders</th>
                            <th>Check-in Record</th>
                            <th>Internal Status</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="queue-container">
                        </tbody>
                </table>
            </div>

            <div id="queue-container-mobile" class="mobile-only">
                </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/empresa.js"></script>
</body>
</html>
